name: Deploy to Vultr (nip.io)

# CI/CD 기준 (0012_InsureGraph Pro 패턴):
#   1. CI(Playwright 6 suites) 통과가 배포 게이트 (workflow_run)
#   2. 서버 직접 빌드 금지 — 정적 자산만 rsync
#   3. 배포 후 /healthz HTTP 200 확인 → 실패 시 워크플로우 실패
# 서버: 호스트 nginx + Certbot. 정적 사이트 → /var/www/towninalpafold
# 도메인: towninalpafold.158.247.235.31.nip.io

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vultr-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Stage & Deploy to Vultr
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Verify required static assets exist
        run: |
          for f in index.html app.js manual.html; do
            [ -f "$f" ] || { echo "::error::missing $f"; exit 1; }
          done

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r index.html app.js manual.html _site/
          [ -f report_v07_alpha.html ] && cp report_v07_alpha.html _site/
          for j in simula_data_real.json simula_data.json forecasts.json causal.json tree_model.json; do
            [ -f "$j" ] && cp "$j" _site/
          done
          for d in components css utils viz docs screenshots data_raw; do
            [ -d "$d" ] && cp -r "$d" "_site/$d"
          done
          du -sh _site/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VULTR_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VULTR_IP }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to Vultr + fix perms + reload nginx
        env:
          IP: ${{ secrets.VULTR_IP }}
        run: |
          WEBROOT=/var/www/towninalpafold
          ssh -i ~/.ssh/deploy_key "root@$IP" "mkdir -p $WEBROOT"
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" _site/ "root@$IP:$WEBROOT/"
          ssh -i ~/.ssh/deploy_key "root@$IP" \
            "chown -R www-data:www-data $WEBROOT && chmod -R a+rX $WEBROOT && systemctl reload nginx"

      - name: Health check
        env:
          IP: ${{ secrets.VULTR_IP }}
        run: |
          URL="https://towninalpafold.$IP.nip.io/healthz"
          for i in $(seq 1 6); do
            code=$(curl -sk -o /dev/null -w "%{http_code}" "$URL" || echo 000)
            [ "$code" = "200" ] && { echo "✓ 배포 검증 통과 ($code)"; exit 0; }
            echo "  시도 $i/6 → $code"; sleep 5
          done
          echo "::error::헬스체크 실패"; exit 1
