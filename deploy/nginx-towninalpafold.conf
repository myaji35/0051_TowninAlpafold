server {
    server_name towninalpafold.158.247.235.31.nip.io;

    root /var/www/towninalpafold;
    index index.html;

    # ─── 백엔드 API 리버스 프록시 (FastAPI uvicorn @127.0.0.1:8000) ───
    # NPL 평가/RWA 토큰화/SaaS API. 정적 사이트와 동일 도메인 서빙(CORS 단순화).
    location /api/  { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }
    location /saas/ { proxy_pass http://127.0.0.1:8000; proxy_set_header Host $host; proxy_set_header X-Forwarded-For $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; }

    location / {
        try_files $uri $uri/ =404;
    }

    # nginx 정적 헬스체크(기존 보존) + 백엔드 헬스(/api/health → uvicorn /health)
    location = /healthz { return 200 "ok"; add_header Content-Type text/plain; }
    location = /api/health { proxy_pass http://127.0.0.1:8000/health; proxy_set_header Host $host; }

    location ~* \.json$  { add_header Cache-Control "public, max-age=300"; }
    location ~* \.html$  { add_header Cache-Control "public, max-age=60"; }
    location ~* \.(js|css|svg|png)$ { add_header Cache-Control "public, max-age=3600"; }

    gzip on;
    gzip_types application/javascript application/json text/css image/svg+xml;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/towninalpafold.158.247.235.31.nip.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/towninalpafold.158.247.235.31.nip.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = towninalpafold.158.247.235.31.nip.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name towninalpafold.158.247.235.31.nip.io;
    return 404; # managed by Certbot


}